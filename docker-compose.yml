version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: examai-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
      POSTGRES_DB: examai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - examai-network

  # Redis Cache & Message Broker
  redis:
    image: redis:7
    container_name: examai-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - examai-network

  # Ollama AI Service (Optional)
  ollama:
    image: ollama/ollama:latest
    container_name: examai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - examai-network

  # FastAPI Backend
  backend:
    build: .
    container_name: examai-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:yourpassword@postgres:5432/examai_db
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
      - DEBUG=True
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./.env:/app/.env
    depends_on:
      - postgres
      - redis
      - ollama
    restart: unless-stopped
    networks:
      - examai-network

volumes:
  postgres_data:
  ollama_data:

networks:
  examai-network:
    driver: bridge